<head>

<title>தமிழ் எழுத்து மண்டலம் · Tamil Eḻuttu Maṇḍalam v2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+Tamil:wght@300;400;500;600;700&display=swap');

:root {
  --bg:           #060408;
  --header-title: #c8a050;
  --header-sub:   rgba(200,160,80,0.40);
  --badge-text:   rgba(200,160,80,0.55);
  --badge-border: rgba(200,160,80,0.22);
  --ring-bold:    rgba(200,160,80,0.42);
  --ring-soft:    rgba(200,160,80,0.18);
  --ctr-fill:     #080508;
  --ctr-stroke:   rgba(200,160,80,0.48);
  --hit-hover:    rgba(255,255,255,0.04);
  --tt-bg:        rgba(6,4,8,0.97);
  --tt-border:    rgba(200,160,80,0.32);
  --tt-cat:       rgba(200,160,80,0.55);
  --tt-ta:        #f5e8c8;
  --tt-rom:       rgba(200,160,80,0.72);
  --tt-verse:     rgba(245,232,200,0.78);
  --tt-trans:     rgba(245,232,200,0.48);
  --tt-num:       rgba(200,160,80,0.38);
  --leg-text:     rgba(245,232,200,0.50);
  --attr-text:    rgba(200,160,80,0.38);
}
html.light {
  --bg:           #fdf8ee;
  --header-title: #7a5010;
  --header-sub:   rgba(122,80,16,0.50);
  --badge-text:   rgba(122,80,16,0.58);
  --badge-border: rgba(122,80,16,0.22);
  --ring-bold:    rgba(90,60,15,0.40);
  --ring-soft:    rgba(90,60,15,0.16);
  --ctr-fill:     #f0e8d4;
  --ctr-stroke:   rgba(90,60,15,0.45);
  --hit-hover:    rgba(0,0,0,0.04);
  --tt-bg:        rgba(253,248,238,0.98);
  --tt-border:    rgba(122,80,16,0.28);
  --tt-cat:       rgba(122,80,16,0.55);
  --tt-ta:        #1a0e04;
  --tt-rom:       rgba(122,80,16,0.70);
  --tt-verse:     rgba(20,12,4,0.80);
  --tt-trans:     rgba(20,12,4,0.50);
  --tt-num:       rgba(122,80,16,0.40);
  --leg-text:     rgba(20,12,4,0.55);
  --attr-text:    rgba(122,80,16,0.48);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;font-family:'EB Garamond',serif;
  transition:background 0.4s;
}

.toggle-wrap{position:fixed;top:16px;right:20px;z-index:1000;}
.toggle-btn{
  display:flex;align-items:center;gap:7px;
  font-family:'Cinzel',serif;font-size:0.60rem;letter-spacing:0.12em;
  color:var(--badge-text);background:var(--bg);
  border:1px solid var(--ring-bold);border-radius:20px;
  padding:7px 16px;cursor:pointer;
  text-transform:uppercase;box-shadow:0 2px 14px rgba(0,0,0,0.28);
  transition:color 0.3s,border-color 0.3s,background 0.4s;
}
.toggle-btn:hover{color:var(--header-title);border-color:var(--header-title);}

header{text-align:center;padding:26px 20px 4px;}
.h-en{
  font-family:'Cinzel',serif;font-weight:700;
  font-size:clamp(0.9rem,2.2vw,1.5rem);letter-spacing:0.24em;
  color:var(--header-title);text-transform:uppercase;transition:color 0.4s;
}
.h-ta{
  font-family:'Noto Serif Tamil',serif;font-weight:600;
  font-size:clamp(1.1rem,2.8vw,1.9rem);color:var(--header-sub);
  margin-top:2px;letter-spacing:0.04em;transition:color 0.4s;
}
.h-sub{
  font-family:'EB Garamond',serif;font-style:italic;
  color:var(--header-sub);font-size:0.76rem;letter-spacing:0.20em;margin-top:3px;
}
.pi-badge{
  display:inline-block;margin-top:7px;font-family:'Cinzel',serif;font-size:0.58rem;
  letter-spacing:0.18em;color:var(--badge-text);
  border:1px solid var(--badge-border);border-radius:20px;padding:2px 12px;
  transition:color 0.4s,border-color 0.4s;
}

.wrap{width:min(96vw,880px);aspect-ratio:1;margin:4px auto 0;}
svg{width:100%;height:100%;overflow:visible;}

/* ── TOOLTIP ── */
#tt{
  position:fixed;background:var(--tt-bg);border:1px solid var(--tt-border);
  border-radius:10px;padding:13px 16px;pointer-events:none;opacity:0;
  transition:opacity .15s;z-index:999;min-width:230px;max-width:300px;
  box-shadow:0 8px 36px rgba(0,0,0,0.32);
}
#tt.on{opacity:1;}
.tt-cat{font-family:'Cinzel',serif;font-size:.56rem;color:var(--tt-cat);
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px;}
.tt-ta{font-family:'Noto Serif Tamil',serif;font-size:2.8rem;font-weight:600;
  color:var(--tt-ta);line-height:1.1;margin-bottom:1px;}
.tt-rom{font-family:'EB Garamond',serif;font-style:italic;font-size:1rem;
  color:var(--tt-rom);margin-bottom:5px;}
.tt-type-tag{display:inline-block;margin-bottom:7px;
  font-family:'Noto Serif Tamil',serif;font-size:0.72rem;
  color:var(--tt-cat);padding:1px 0;}
.tt-divider{height:1px;background:var(--tt-border);margin:6px 0 8px;}
.tt-verse-head{
  display:flex;align-items:center;gap:6px;margin-bottom:5px;
}
.tt-verse-num{
  font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.10em;
  color:var(--tt-num);background:rgba(200,160,80,0.10);
  border:1px solid rgba(200,160,80,0.20);border-radius:20px;
  padding:1px 7px;flex-shrink:0;
}
.tt-verse-poet{font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.12em;
  color:var(--tt-cat);text-transform:uppercase;}
.tt-verse-ta{
  font-family:'Noto Serif Tamil',serif;font-size:0.90rem;font-weight:500;
  color:var(--tt-verse);line-height:1.65;margin-bottom:4px;
}
.tt-verse-en{
  font-family:'EB Garamond',serif;font-size:0.74rem;font-style:italic;
  color:var(--tt-trans);line-height:1.55;
}
.tt-no-verse{font-family:'EB Garamond',serif;font-size:0.72rem;font-style:italic;
  color:var(--tt-num);margin-top:4px;}

/* ── LEGEND + FOOTER ── */
footer{display:flex;flex-wrap:wrap;justify-content:center;
  gap:4px 14px;padding:8px 20px 4px;max-width:860px;}
.leg{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;
  font-size:.56rem;color:var(--leg-text);letter-spacing:.06em;
  cursor:pointer;border-radius:6px;padding:3px 6px;margin:-3px -6px;
  transition:background 0.2s;}
.leg:hover{background:var(--hit-hover);}
.leg.active{background:rgba(200,160,80,0.08);}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.leg-text-wrap{display:flex;flex-direction:column;gap:0px;}
.leg-en{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.06em;color:var(--leg-text);}
.leg-ta{font-family:'Noto Serif Tamil',serif;font-size:.60rem;color:var(--badge-text);}
.leg-rom{font-family:'EB Garamond',serif;font-style:italic;font-size:.58rem;color:var(--badge-text);opacity:0.65;}
.leg-div{width:100%;text-align:center;color:var(--badge-text);
  font-size:.52rem;letter-spacing:.1em;padding:2px 0;font-family:'Cinzel',serif;}
.leg-div-ta{font-family:'Noto Serif Tamil',serif;font-size:.58rem;display:block;opacity:0.55;margin-top:1px;}

@keyframes segPulse{
  0%  {filter:brightness(1)   drop-shadow(0 0 0px currentColor);}
  40% {filter:brightness(2.0) drop-shadow(0 0 10px currentColor);}
  100%{filter:brightness(1.5) drop-shadow(0 0 4px currentColor);}
}
.seg-pulse{animation:segPulse 0.55s ease-out forwards;}
.seg-dim  {opacity:0.06!important;transition:opacity 0.25s;}
.seg-bright{opacity:1!important;transition:opacity 0.25s;}

#legendClear{
  display:none;margin:5px auto 0;
  font-family:'Cinzel',serif;font-size:0.57rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--badge-text);
  background:var(--bg);border:1px solid var(--ring-bold);
  border-radius:20px;padding:4px 14px;cursor:pointer;
  transition:color 0.2s,border-color 0.2s,background 0.4s;
}
#legendClear.show{display:block;}
#legendClear:hover{color:var(--header-title);border-color:var(--header-title);}

.attribution{
  width:100%;text-align:center;padding:8px 0 20px;
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:0.74rem;color:var(--attr-text);
  letter-spacing:0.12em;transition:color 0.4s;
}
</style>

  document.getElementById('tIcon').textContent=L?'☾':'☀';

// ── SVG UTILITIES
const SVG_NS='http://www.w3.org/2000/svg';
const SV=document.getElementById('SV');
const CX=450,CY=450;

function polar(cx,cy,r,deg){
  const rad=deg*Math.PI/180;
  return [cx+r*Math.cos(rad),cy+r*Math.sin(rad)];
}
function arcPath(cx,cy,r1,r2,a1,a2){
  const [x1,y1]=polar(cx,cy,r1,a1),[x2,y2]=polar(cx,cy,r1,a2);
  const [x3,y3]=polar(cx,cy,r2,a2),[x4,y4]=polar(cx,cy,r2,a1);
  const lg=(a2-a1)>180?1:0;
  return `M${x1},${y1} A${r1},${r1},0,${lg},1,${x2},${y2} L${x3},${y3} A${r2},${r2},0,${lg},0,${x4},${y4} Z`;
}
function svgEl(tag,a={}){
  const e=document.createElementNS(SVG_NS,tag);
  for(const[k,v]of Object.entries(a))e.setAttribute(k,v);
  return e;
}

function drawArcText(str,cx,cy,r,startD,endD,col,fs,op){
  const span=endD-startD,mid=startD+(span/2);
  const id='ap'+Math.random().toString(36).slice(2,6);
  const [sx,sy]=polar(cx,cy,r,startD);
  const [ex,ey]=polar(cx,cy,r,endD);
  const lg=span>180?1:0;
  const p=svgEl('path',{id,d:`M${sx},${sy} A${r},${r},0,${lg},1,${ex},${ey}`,fill:'none'});
  SV.appendChild(p);
  const tp=document.createElementNS(SVG_NS,'textPath');
  tp.setAttribute('href','#'+id);tp.setAttribute('startOffset','50%');
  tp.setAttribute('text-anchor','middle');tp.textContent=str;
  const t=svgEl('text');
  t.setAttribute('font-family','Noto Serif Tamil, serif');
  t.setAttribute('font-size',fs);t.setAttribute('fill',col);
  t.setAttribute('fill-opacity',op);
  t.appendChild(tp);SV.appendChild(t);
}

// ── TOOLTIP
const ttEl=document.getElementById('tt');

function showTT(e,rec,col,cls){
  const isVowel=(cls==='uyir');
  const lookupLetter = isVowel ? rec.ta : rec.root;

  // Category label
  let catLabel = isVowel
    ? `உயிர் · VOWEL`
    : `மெய் · CONSONANT`;

  document.getElementById('tt-cat').textContent=catLabel;
  document.getElementById('tt-ta').textContent = isVowel ? rec.ta : rec.root;
  document.getElementById('tt-rom').textContent = rec.rom||'';
  document.getElementById('tt-type').textContent = rec.typeTa||'';
  document.getElementById('tt-type').style.color = col;

  // Find verse
  const vnum = LETTER_PRIMARY[lookupLetter];
  const allNums = LETTER_ALL[lookupLetter] || [];
  const verse = vnum ? ATCHI[vnum] : null;

  const hasdiv = !!verse;
  document.getElementById('tt-div').style.display   = hasdiv?'block':'none';
  document.getElementById('tt-vhead').style.display = hasdiv?'flex':'none';
  document.getElementById('tt-vta').style.display   = hasdiv?'block':'none';
  document.getElementById('tt-ven').style.display   = hasdiv?'block':'none';
  document.getElementById('tt-novs').style.display  = hasdiv?'none':'block';

  if(verse){
    const extra = allNums.length>1 ? ` +${allNums.length-1}` : '';
    document.getElementById('tt-vnum').textContent  = `#${vnum}${extra}`;
    document.getElementById('tt-vta').textContent   = verse.ta;
    document.getElementById('tt-ven').textContent   = verse.en;
  }

  ttEl.classList.add('on');
  moveTT(e);
}
function moveTT(e){
  let x=e.clientX+16,y=e.clientY+16;
  if(x+310>window.innerWidth) x=e.clientX-318;
  if(y+280>window.innerHeight)y=e.clientY-288;
  ttEl.style.left=x+'px';ttEl.style.top=y+'px';
}
function hideTT(){ttEl.classList.remove('on');}

// ── LEGEND HIGHLIGHT
let activeCat=null;

function getMatches(cat){
  const s=new Set();
  allSegs.forEach(({idx,cls,type})=>{
    let hit=false;
    if(cat==='kuril')     hit=cls==='uyir'&&type==='kuril';
    else if(cat==='nedil')    hit=cls==='uyir'&&type==='nedil';
    else if(cat==='melmoḻi')  hit=cls==='uyir'&&type==='melmoḻi';
    else if(cat==='aytam')    hit=cls==='uyir'&&type==='aytam';
    else if(cat==='vallinam') hit=cls==='mey'&&type==='vallinam';
    else if(cat==='mellinam') hit=cls==='mey'&&type==='mellinam';
    else if(cat==='idaiyinam')hit=cls==='mey'&&type==='idaiyinam';
    if(hit)s.add(idx);
  });
  return s;
}
function applyHL(cat){
  const m=getMatches(cat);
  document.querySelectorAll('[data-seg-idx]').forEach(el=>{
    const i=parseInt(el.getAttribute('data-seg-idx'));
    el.classList.remove('seg-pulse','seg-dim','seg-bright');
    if(m.has(i)){el.classList.add('seg-bright');void el.offsetWidth;el.classList.add('seg-pulse');}
    else el.classList.add('seg-dim');
  });
  document.querySelectorAll('[data-lbl-idx]').forEach(el=>{
    el.style.opacity=m.has(parseInt(el.getAttribute('data-lbl-idx')))?'1':'0.05';
  });
  document.querySelectorAll('.leg').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  document.getElementById('legendClear').classList.add('show');
}
function clearLegendHighlight(){
  activeCat=null;
  document.querySelectorAll('[data-seg-idx]').forEach(el=>
    el.classList.remove('seg-pulse','seg-dim','seg-bright'));
  document.querySelectorAll('[data-lbl-idx]').forEach(el=>el.style.opacity='');
  document.querySelectorAll('.leg').forEach(el=>el.classList.remove('active'));
  document.getElementById('legendClear').classList.remove('show');
}
function onLegClick(cat){
  activeCat===cat?clearLegendHighlight():(activeCat=cat,applyHL(cat));
}

// ── BUILD LEGEND
const footer=document.getElementById('footer');
[
  {col:PC.kuril,     en:'Kuṟil',     ta:'குறில்',     rom:'Short vowel',    cat:'kuril'},
  {col:PC.nedil,     en:'Neṭil',     ta:'நெடில்',     rom:'Long vowel',     cat:'nedil'},
  {col:PC.melmoḻi,  en:'Mēlmoḻi',  ta:'மேல்மொழி',   rom:'ஐ and ஔ',       cat:'melmoḻi'},
  {col:PC.aytam,     en:'Āytam',     ta:'ஆய்தம்',    rom:'ஃ',              cat:'aytam'},
  null,
  {col:PC.vallinam,  en:'Valliṇam',  ta:'வல்லினம்',  rom:'Hard stops',     cat:'vallinam'},
  {col:PC.mellinam,  en:'Meḷḷiṇam', ta:'மெல்லினம்',  rom:'Nasals',         cat:'mellinam'},
  {col:PC.idaiyinam, en:'Idaiyiṇam', ta:'இடையினம்',  rom:'Middle glides',  cat:'idaiyinam'},
].forEach(item=>{
  if(!item){
    const d=document.createElement('div');d.className='leg-div';
    d.innerHTML='── மெய் எழுத்து வகைகள் ──<span class="leg-div-ta">Consonant classes</span>';
    footer.appendChild(d);return;
  }
  const d=document.createElement('div');d.className='leg';
  d.dataset.cat=item.cat;
  d.title='Click to highlight';
  d.addEventListener('click',()=>onLegClick(item.cat));
  d.innerHTML=`
    <div class="leg-dot" style="background:${item.col}"></div>
    <div class="leg-text-wrap">
      <span class="leg-en">${item.en}</span>
      <span class="leg-ta">${item.ta}</span>
      <span class="leg-rom">${item.rom}</span>
    </div>`;
  footer.appendChild(d);
});

buildChart();
